version: "0.29.0"

definitions:
  record_selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path: []

  base_requester:
    type: HttpRequester
    url_base: https://api.planhat.com
    http_method: GET
    authenticator:
      type: BearerAuthenticator
      api_token: "{{ config['api_token'] }}"
    request_headers: {}
    request_body_json: {}
    request_parameters: {}

  default_paginator:
    type: "DefaultPaginator"
    page_size_option:
      type: "RequestOption"
      field_name: "limit"
      inject_into: request_parameter
    page_token_option:
      type: "RequestOption"
      field_name: "offset"
      inject_into: request_parameter

  #--- Streams

  churn_stream:
    type: DeclarativeStream
    name: churn
    primary_key:
      - _id
    retriever:
      type: SimpleRetriever
      record_selector:
        $ref: "#/definitions/record_selector"
      requester:
        $ref: "#/definitions/base_requester"
        path: "/churn"
      paginator:
        $ref: "#/definitions/default_paginator"
        pagination_strategy:
          type: OffsetIncrement
          page_size: 2000
    schema_loader:
      type: JsonFileSchemaLoader
      file_path: "./source_planhat/schemas/churn.json"

  companies_stream:
    type: DeclarativeStream
    name: companies
    primary_key:
      - _id
    retriever:
      type: SimpleRetriever
