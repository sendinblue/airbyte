        $ref: "#/definitions/base_requester"
        path: "/companies"
      paginator:
        $ref: "#/definitions/default_paginator"
        pagination_strategy:
          type: OffsetIncrement
          page_size: 5000
    schema_loader:
      type: JsonFileSchemaLoader
      file_path: "./source_planhat/schemas/companies.json"

