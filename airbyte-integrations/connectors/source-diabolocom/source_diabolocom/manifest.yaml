version: "0.29.0"

definitions:
  selector:
    extractor:
      field_path: [ ]
  requester:
    url_base: "https://public-fr6.engage.diabolocom.com/api/v1"
    http_method: "GET"
    authenticator:
      type: ApiKeyAuthenticator
      api_token: '{{ config[''api_key''] }}'
      inject_into:
        type: RequestOption
        field_name: Private-Token
        inject_into: header
  retriever:
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
  base_stream:
    retriever:
      $ref: "#/definitions/retriever"
  users_stream:
    $ref: "#/definitions/base_stream"
    $parameters:
      name: "users"
      primary_key: "id"
      path: "/account/users"

streams:
  - "#/definitions/users_stream"
check:
  stream_names:
    - "users"